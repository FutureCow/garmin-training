<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inloggen — Garmin Training</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="card">
      <h1 style="font-size:1.4rem;margin-bottom:1.5rem;">🏃 Garmin Training</h1>
      <div id="alert" class="alert alert-error" style="display:none;"></div>

      <div id="login-form">
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="login-email" placeholder="jij@example.com" />
        </div>
        <div class="form-group">
          <label>Wachtwoord</label>
          <input type="password" id="login-password" />
        </div>
        <button class="btn btn-primary" id="login-btn" style="width:100%">Inloggen</button>
        <p style="margin-top:1rem;text-align:center;font-size:.9rem;">
          Nog geen account? <a href="#" id="show-register">Registreer</a>
        </p>
      </div>

      <div id="register-form" style="display:none;">
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="reg-email" placeholder="jij@example.com" />
        </div>
        <div class="form-group">
          <label>Wachtwoord</label>
          <input type="password" id="reg-password" placeholder="minimaal 8 tekens" />
        </div>
        <button class="btn btn-primary" id="register-btn" style="width:100%">Account aanmaken</button>
        <p style="margin-top:1rem;text-align:center;font-size:.9rem;">
          Al een account? <a href="#" id="show-login">Inloggen</a>
        </p>
      </div>
    </div>
  </div>
  <script type="module" src="/js/auth.js"></script>
</body>
</html>
